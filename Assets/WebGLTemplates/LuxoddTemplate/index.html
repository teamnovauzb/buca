<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Unity WebGL Player | {{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
	<script>
  function LuxoddApplyVisualViewportSize() {
    const vv = window.visualViewport;

    const cssW = Math.floor(vv ? vv.width : window.innerWidth);
    const cssH = Math.floor(vv ? vv.height : window.innerHeight);

    const offX = Math.floor(vv ? vv.offsetLeft : 0);
    const offY = Math.floor(vv ? vv.offsetTop : 0);

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    if (!container || !canvas) return;

    container.style.left = offX + "px";
    container.style.top = offY + "px";
    container.style.width = cssW + "px";
    container.style.height = cssH + "px";

    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";

    const dpr = window.devicePixelRatio || 1;
    const pxW = Math.floor(cssW * dpr);
    const pxH = Math.floor(cssH * dpr);

    if (canvas.width !== pxW) canvas.width = pxW;
    if (canvas.height !== pxH) canvas.height = pxH;
  }

  function LuxoddInstallViewportHandlers() {
    if (window.__luxoddViewportHandlersInstalled) return;
    window.__luxoddViewportHandlersInstalled = true;

    const apply = () => LuxoddApplyVisualViewportSize();

    window.addEventListener("resize", apply);
    window.addEventListener("orientationchange", apply);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", apply);
      window.visualViewport.addEventListener("scroll", apply);
    }

    apply();
    setTimeout(apply, 0);
    setTimeout(apply, 200);
    setTimeout(apply, 500);
  }


  function LuxoddForceApplyViewportAfterUnityStart() {
    const apply = () => LuxoddApplyVisualViewportSize();

    apply();
    setTimeout(apply, 0);
    setTimeout(apply, 100);
    setTimeout(apply, 250);
    setTimeout(apply, 500);
    setTimeout(apply, 1000);
  }
</script>

  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}} tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>

	
	<script>
    const currentVersion = {{{ JSON.stringify(PRODUCT_VERSION) }}};
    const sessionKey = 'reloaded';

    if (!sessionStorage.getItem(sessionKey)) {
        sessionStorage.setItem(sessionKey, true);
        window.location.reload(true);
		//window.location.href = window.location.pathname + '?v=' + currentVersion
    }
</script>

<script>
  const pluginVersion = "1.0.11";
</script>
	
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
	  LuxoddInstallViewportHandlers();
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_THREADS
        workerUrl: buildUrl + "/{{{ WORKER_FILENAME }}}",
#endif
#if USE_WASM
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if MEMORY_FILENAME
        memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        showBanner: unityShowBanner,
      };

      // By default Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      config.matchWebGLToCanvasSize = false;


#if BACKGROUND_FILENAME
      canvas.style.background = "url('" + buildUrl + "/{{{ BACKGROUND_FILENAME.replace(/'/g, '%27') }}}') center / cover";
#endif
      loadingBar.style.display = "block";
	  
	  window.unityInstance = null;

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
		  window.unityInstance = unityInstance;
		  LuxoddForceApplyViewportAfterUnityStart();
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
